<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Production Canvas - 2026-03-19</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Core) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PptxGenJS -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * Inline SVG Icon Component
         * Fixed: Wrapped adjacent JSX elements in Fragments (<>...</>)
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></>,
                Loader2: <><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></>,
                MousePointer2: <><path d="m4 4 7.07 17 2.51-7.39L21 11.1z"/><path d="m13 13 6 6"/></>,
                Key: <><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></>,
                X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></>,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11"/>,
                List: <><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></>,
                Flag: <><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                ImageIcon: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
                ArrowUp: <><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></>,
                ArrowDown: <><path d="m19 12-7 7-7-7"/><path d="M12 5v14"/></>,
                ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
                ArrowRight: <><path d="m12 5 7 7-7 7"/><path d="M5 12h14"/></>,
                Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                Plus: <><path d="M12 5v14"/><path d="M5 12h14"/></>
            };
            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [envApiKey, setEnvApiKey] = useState("");
            const [itemType, setItemType] = useState('x-banner');
            const [subType, setSubType] = useState('standard');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiMessage, setAiMessage] = useState(null);
            const [showPptGuide, setShowPptGuide] = useState(true);
            const [showSettings, setShowSettings] = useState(false);
            const aiInputRef = useRef(null);

            const [formData, setFormData] = useState({
                title: '제12회 글로벌 데이터 인사이트 포럼',
                date: '2024. 10. 25(금) 10:00 - 17:00',
                venue: '그랜드 볼룸 A홀',
                organizers: '데이터 허브 재단',
                direction: 'down',
                welcomeMsg: '방문을 환영합니다',
                speakerName: '김철수 교수',
                speakerRole: '데이터 과학 연구소장',
                engTitle: 'Global Data Insight Forum',
                schedule: [
                    { time: '10:00', content: '개회사 및 기조연설' },
                    { time: '13:00', content: '데이터 전략 세션' }
                ]
            });

            const [logoImg, setLogoImg] = useState(null);
            const [contentImg, setContentImg] = useState(null);
            const [bgImg, setBgImg] = useState(null);

            const templates = {
                'x-banner': { 
                    name: 'X-배너', width: 600, height: 1800, ratio: '600x1800mm', pptW: 2.36, pptH: 7.08,
                    variants: [
                        { id: 'standard', name: '기본 안내형', icon: 'FileText', fields: ['title', 'date', 'venue', 'organizers'] },
                        { id: 'directional', name: '방향 지시형', icon: 'Navigation', fields: ['title', 'venue', 'direction', 'organizers'] },
                        { id: 'schedule', name: '프로그램형', icon: 'List', fields: ['title', 'schedule', 'organizers'] }
                    ]
                },
                'horizontal': { 
                    name: '가로 현수막', width: 5000, height: 900, ratio: '5000x900mm', pptW: 10, pptH: 1.8,
                    variants: [
                        { id: 'standard', name: '무대 메인형', icon: 'Flag', fields: ['title', 'date', 'venue', 'organizers'] },
                        { id: 'welcome', name: '환영 문구형', icon: 'Users', fields: ['welcomeMsg', 'title', 'organizers'] }
                    ]
                },
                'vertical': { 
                    name: '세로 현수막', width: 900, height: 3000, ratio: '900x3000mm', pptW: 3, pptH: 10,
                    variants: [
                        { id: 'standard', name: '홍보 포스터형', icon: 'ImageIcon', fields: ['title', 'date', 'venue'] },
                        { id: 'speaker', name: '연사 소개형', icon: 'User', fields: ['speakerName', 'speakerRole', 'title', 'organizers'] }
                    ]
                },
                'podium': { 
                    name: '코디움 타이틀', width: 600, height: 400, ratio: '600x400mm', pptW: 4, pptH: 2.6,
                    variants: [
                        { id: 'standard', name: '표준형', icon: 'FileText', fields: ['title', 'organizers'] },
                        { id: 'dual', name: '국/영문 혼용', icon: 'Users', fields: ['title', 'engTitle', 'organizers'] }
                    ]
                }
            };

            const currentTemplate = templates[itemType];
            const activeVariant = currentTemplate.variants.find(v => v.id === subType) || currentTemplate.variants[0];

            const handleChange = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));
            
            const handleImageUpload = (e, type) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (type === 'logo') setLogoImg(reader.result);
                        if (type === 'content') setContentImg(reader.result);
                        if (type === 'bg') setBgImg(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const analyzeSituation = async (text) => {
                if (!text || !text.trim()) return;
                if (!envApiKey) {
                    setAiMessage({ type: 'error', text: '설정(⚙️) 버튼을 눌러 Gemini API 키를 입력해 주세요.' });
                    return;
                }

                setIsAiLoading(true);
                setAiMessage(null);
                
                const systemPrompt = `Extract event decoration info. Return JSON ONLY. itemType: x-banner|horizontal|vertical|podium. subType: standard|directional|schedule|welcome|speaker|dual. Fields: title, date, venue, organizers, welcomeMsg, speakerName, speakerRole, engTitle, reason(Korean).`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${envApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const result = JSON.parse(resultText || "{}");
                    
                    if (result.itemType && templates[result.itemType]) setItemType(result.itemType);
                    if (result.subType) setSubType(result.subType);
                    setFormData(prev => ({ ...prev, ...result }));
                    setAiMessage({ type: 'success', text: result.reason || 'AI 분석 및 추출이 완료되었습니다.' });
                } catch (e) {
                    setAiMessage({ type: 'error', text: '분석 중 오류가 발생했습니다. API 키가 유효한지 확인하세요.' });
                } finally {
                    setIsAiLoading(false);
                }
            };

            const exportToPPT = () => {
                if (!window.PptxGenJS) return;
                const pptx = new window.PptxGenJS();
                pptx.defineLayout({ name: 'CUSTOM', width: currentTemplate.pptW, height: currentTemplate.pptH });
                pptx.layout = 'CUSTOM';
                const slide = pptx.addSlide();

                if (bgImg) slide.addImage({ data: bgImg, x: 0, y: 0, w: '100%', h: '100%' });
                if (logoImg) slide.addImage({ data: logoImg, x: (currentTemplate.pptW/2)-0.5, y: 0.2, w: 1, h: 0.4, sizing: { type: 'contain' } });

                if (subType === 'directional') {
                    slide.addText(formData.title, { x: 0.1, y: 1.0, w: currentTemplate.pptW-0.2, align: 'center', fontSize: 16, bold: true });
                    const arrowMap = { up: 'upArrow', down: 'downArrow', left: 'leftArrow', right: 'rightArrow' };
                    slide.addShape(pptx.ShapeType[arrowMap[formData.direction]], { x: (currentTemplate.pptW/2)-0.4, y: 2.0, w: 0.8, h: 0.8, fill: { color: '333333' } });
                    slide.addText(formData.venue, { x: 0.1, y: 3.5, w: currentTemplate.pptW-0.2, align: 'center', fontSize: 24, bold: true, color: '4F46E5' });
                } else {
                    slide.addText(formData.title, { x: 0.1, y: '35%', w: currentTemplate.pptW-0.2, align: 'center', fontSize: 24, bold: true });
                    slide.addText(formData.date, { x: 0.1, y: '50%', w: currentTemplate.pptW-0.2, align: 'center', fontSize: 12 });
                    slide.addText(formData.venue, { x: 0.1, y: '55%', w: currentTemplate.pptW-0.2, align: 'center', fontSize: 14, bold: true });
                }

                slide.addText(formData.organizers, { x: 0, y: currentTemplate.pptH-0.6, w: '100%', align: 'center', fontSize: 10, color: '888888' });
                pptx.writeFile({ fileName: `Guide_${formData.title}.pptx` });
            };

            return (
                <div className="min-h-screen flex flex-col overflow-hidden bg-slate-50">
                    {/* Header */}
                    <header className="bg-slate-900 text-white px-6 py-4 flex justify-between items-center z-30 border-b border-white/5 shadow-xl">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-500 p-2 rounded-xl text-white shadow-lg shadow-indigo-500/20">
                                <Icon name="Sparkles" />
                            </div>
                            <div>
                                <h1 className="text-lg font-black tracking-tighter uppercase">AI Production Canvas</h1>
                                <div className="text-[10px] font-bold text-slate-400">Ver 2.5 • 2026-03-19</div>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(!showSettings)} className={`p-2.5 rounded-xl border transition-all ${showSettings ? 'bg-indigo-500 border-indigo-500 shadow-lg' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}>
                                <Icon name="Settings" size={18} />
                            </button>
                            <button onClick={() => setShowPptGuide(!showPptGuide)} className="px-4 py-2 rounded-xl text-xs font-bold border border-white/20 hover:bg-white/5 transition-all flex items-center gap-2">
                                <Icon name="MousePointer2" size={14}/> 가이드 {showPptGuide ? 'ON' : 'OFF'}
                            </button>
                            <button onClick={exportToPPT} className="bg-white text-slate-900 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 hover:bg-indigo-50 transition-all shadow-lg active:scale-95">
                                <Icon name="Download" size={14} /> PPT 내보내기
                            </button>
                        </div>
                    </header>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="absolute top-20 right-6 w-80 bg-white border border-slate-200 rounded-3xl shadow-2xl z-50 p-6 animate-in fade-in zoom-in-95">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-sm font-black flex items-center gap-2 text-slate-900"><Icon name="Key" size={16} className="text-indigo-500"/> API Settings</h3>
                                <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-900"><Icon name="X" size={16}/></button>
                            </div>
                            <p className="text-[10px] text-slate-500 mb-4 font-medium leading-relaxed">Gemini API 키를 입력하여 AI 기능을 활성화하세요.</p>
                            <input type="password" value={envApiKey} onChange={(e) => setEnvApiKey(e.target.value)} placeholder="Gemini API Key..." className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono mb-4 outline-none focus:border-indigo-500"/>
                            <button onClick={() => setShowSettings(false)} className="w-full py-2.5 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-indigo-600 transition-colors">저장 및 닫기</button>
                        </div>
                    )}

                    {/* AI Input Section */}
                    <div className="bg-white border-b border-slate-200 px-6 py-6 z-20">
                        <div className="max-w-4xl mx-auto relative group">
                            <div className="absolute left-5 top-1/2 -translate-y-1/2 text-indigo-600">
                                {isAiLoading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Search" />}
                            </div>
                            <input ref={aiInputRef} type="text" onKeyDown={(e) => e.key === 'Enter' && analyzeSituation(e.currentTarget.value)} placeholder="상황을 설명하세요 (예: 600x1800 배너, 제목은 2026 AI 포럼, 날짜는 10월 20일)" className="w-full pl-14 pr-32 py-5 bg-slate-100/50 border-2 border-slate-100 rounded-[2rem] text-sm font-medium focus:outline-none focus:border-indigo-500/30 transition-all shadow-inner"/>
                            <button onClick={() => analyzeSituation(aiInputRef.current?.value)} className="absolute right-3 top-1/2 -translate-y-1/2 bg-slate-900 text-white px-6 py-2.5 rounded-full text-xs font-bold hover:bg-indigo-600 transition-all shadow-lg">AI 추출</button>
                        </div>
                        {aiMessage && (
                            <div className={`mt-3 max-w-4xl mx-auto px-5 py-2.5 rounded-2xl text-[11px] font-bold flex items-center gap-2 animate-in fade-in slide-in-from-top-1 ${aiMessage.type === 'success' ? 'bg-indigo-50 text-indigo-600 border border-indigo-100' : 'bg-red-50 text-red-600 border border-red-100'}`}>
                                <Icon name={aiMessage.type === 'success' ? "CheckCircle2" : "AlertCircle"} size={14} />
                                {aiMessage.text}
                            </div>
                        )}
                    </div>

                    <main className="flex-1 flex overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-[400px] bg-white border-r border-slate-200 overflow-y-auto p-6 space-y-8 scrollbar-hide">
                            <section>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 block font-bold">1. 타입 및 스타일</label>
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    {Object.entries(templates).map(([key, value]) => (
                                        <button key={key} onClick={() => {setItemType(key); setSubType('standard');}} className={`p-4 rounded-2xl border-2 transition-all text-left ${itemType === key ? 'border-indigo-600 bg-indigo-50 shadow-sm' : 'border-slate-50 bg-slate-50/30 hover:border-slate-200 hover:bg-white'}`}>
                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center mb-2 ${itemType === key ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-200 text-slate-500'}`}>
                                                <Icon name="FileText" size={16} />
                                            </div>
                                            <div className="font-bold text-[11px] text-slate-800">{value.name}</div>
                                        </button>
                                    ))}
                                </div>
                                <div className="flex flex-col gap-1.5 p-1 bg-slate-50 rounded-2xl">
                                    {currentTemplate.variants.map((v) => (
                                        <button key={v.id} onClick={() => setSubType(v.id)} className={`w-full p-3 rounded-xl border-2 flex items-center gap-3 transition-all ${subType === v.id ? 'bg-slate-900 text-white border-slate-900 shadow-xl' : 'bg-white text-slate-500 border-white hover:border-slate-100 shadow-sm'}`}>
                                            <Icon name={v.icon} size={14} /> <span className="text-xs font-black">{v.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section className="space-y-4">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block font-bold">2. 상세 콘텐츠 입력</label>
                                <div className="bg-slate-100/30 p-5 rounded-[2rem] border border-slate-100 space-y-4 shadow-inner">
                                    <div className="space-y-1">
                                        <span className="text-[9px] font-black text-slate-400 uppercase ml-1">Main Title</span>
                                        <textarea value={formData.title} onChange={(e)=>handleChange('title', e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-indigo-500/10 outline-none" rows={2} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <span className="text-[9px] font-black text-slate-400 uppercase ml-1">Date</span>

                                         backgroundPosition: 'center'

                                    {showPptGuide && (

                                        </div>

                                    <div className="p-6 flex justify-center z-20">

                                    <div className="flex-1 flex flex-col items-center px-10 justify-center text-center z-20">
                                        <div className="bg-white/40 backdrop-blur-2xl p-10 rounded-[3rem] border border-white/60 shadow-2xl shadow-indigo-900/5">
                                            <h3 className="text-2xl font-black text-slate-900 leading-[1.1] mb-6 break-keep">{formData.title}</h3>
                                            <div className="space-y-2">
                                                <div className="text-[10px] text-slate-500 font-black font-mono bg-slate-900/5 px-4 py-1.5 rounded-full inline-block">{formData.date}</div>

                                        </div>

                                    <div className="p-8 mt-auto bg-slate-900/5 backdrop-blur-md border-t border-slate-200/10 text-center">
                                        <div className="text-[10px] font-black text-slate-400 tracking-[0.3em] uppercase">{formData.organizers}</div>
                                    </div>
                                </div>

                                <div className="absolute -top-12 left-0 flex gap-2">
                                    <span className="bg-slate-900 text-white px-5 py-2 rounded-full text-[10px] font-black shadow-xl uppercase tracking-widest">{currentTemplate.name}</span>
                                    <span className="bg-white text-slate-400 px-5 py-2 rounded-full text-[10px] font-black shadow-xl border border-slate-100 uppercase tracking-widest">{currentTemplate.ratio}</span>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-white border-t border-slate-200 px-8 py-3 flex justify-between items-center z-30 shadow-inner">
                        <div className="flex gap-8 text-[10px] font-black text-slate-400 uppercase tracking-widest font-bold">
                            <span className="flex items-center gap-2 text-green-500"><Icon name="CheckCircle2" size={12} /> System Live</span>
                            <span className="flex items-center gap-2"><Icon name="ImageIcon" size={12} className="text-indigo-500" /> Auto Mapping Ready</span>
                        </div>
                        <div className="text-[10px] font-black text-slate-300 italic tracking-tighter uppercase">AI PRODUCTION CANVAS • 2026-03-19</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
