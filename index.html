<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Production Canvas - 2026-03-19</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Core) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PptxGenJS -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 배너 프리뷰 입체 효과 */
        .banner-preview-box {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .guide-grid {
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * 안정적인 인라인 SVG 아이콘 컴포넌트
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></>,
                Loader2: <><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></>,
                MousePointer2: <><path d="m4 4 7.07 17 2.51-7.39L21 11.1z"/><path d="m13 13 6 6"/></>,
                Key: <><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></>,
                X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></>,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11"/>,
                Flag: <><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
                ArrowUp: <><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></>,
                ArrowDown: <><path d="m19 12-7 7-7-7"/><path d="M12 5v14"/></>,
                ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
                ArrowRight: <><path d="m12 5 7 7-7 7"/><path d="M5 12h14"/></>,
                Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                Plus: <><path d="M12 5v14"/><path d="M5 12h14"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [envApiKey, setEnvApiKey] = useState("");
            const [itemType, setItemType] = useState('x-banner');
            const [subType, setSubType] = useState('standard');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiMessage, setAiMessage] = useState(null);
            const [showPptGuide, setShowPptGuide] = useState(true);
            const [showSettings, setShowSettings] = useState(false);
            const aiInputRef = useRef(null);

            const [formData, setFormData] = useState({
                title: '제12회 글로벌 데이터 인사이트 포럼',
                date: '2024. 10. 25(금) 10:00 - 17:00',
                venue: '그랜드 볼룸 A홀',
                organizers: '데이터 허브 재단',
                direction: 'down'
            });

            const [logoImg, setLogoImg] = useState(null);
            const [bgImg, setBgImg] = useState(null);

            // 1:10 스케일링 설정 (Inches 단위)
            const templates = {
                'x-banner': { 
                    name: 'X-배너', width: 600, height: 1800, ratio: '600x1800mm', 
                    pptW: 6.0, pptH: 18.0, visualW: 280, visualH: 840 
                },
                'horizontal': { 
                    name: '가로 현수막', width: 5000, height: 900, ratio: '5000x900mm', 
                    pptW: 50.0, pptH: 9.0, visualW: 820, visualH: 148
                },
                'vertical': { 
                    name: '세로 현수막', width: 900, height: 2400, ratio: '900x2400mm', 
                    pptW: 9.0, pptH: 24.0, visualW: 240, visualH: 640
                }
            };

            const current = templates[itemType] || templates['x-banner'];

            const handleChange = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));
            
            const handleImageUpload = (e, type) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (type === 'logo') setLogoImg(reader.result);
                        if (type === 'bg') setBgImg(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const analyzeSituation = async (text) => {
                if (!text || !text.trim()) return;
                if (!envApiKey) {
                    setAiMessage({ type: 'error', text: 'Gemini API 키를 먼저 입력해주세요.' });
                    setShowSettings(true);
                    return;
                }
                setIsAiLoading(true);
                setAiMessage(null);
                const systemPrompt = `Analyze event banner context. Return ONLY JSON. itemType: x-banner|horizontal|vertical. subType: standard|directional. Fields: title, date, venue, organizers, direction. Reason in Korean.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${envApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                    if (result.itemType) setItemType(result.itemType);
                    setFormData(prev => ({ ...prev, ...result }));
                    setAiMessage({ type: 'success', text: result.reason || 'AI가 정보를 구성했습니다.' });
                } catch (e) {
                    setAiMessage({ type: 'error', text: 'AI 분석 중 오류가 발생했습니다.' });
                } finally {
                    setIsAiLoading(false);
                }
            };

            /**
             * 전문 제작용 PPT 내보내기 (각 객체 분리 매핑)
             */
            const exportToPPT = () => {
                if (!window.PptxGenJS) return;
                const pptx = new window.PptxGenJS();
                
                // 슬라이드 규격 정의 (1:10 스케일)
                pptx.defineLayout({ name: 'BANNER_PRO', width: current.pptW, height: current.pptH });
                pptx.layout = 'BANNER_PRO';
                const slide = pptx.addSlide();

                const w = current.pptW;
                const h = current.pptH;

                // 1. 배경 이미지 (편집 불가능하게 바닥에 깔거나, 편집 가능하게 Shape로 추가)
                if (bgImg) slide.addImage({ data: bgImg, x: 0, y: 0, w: '100%', h: '100%' });

                // 2. 로고 (상단 5-8% 구역)
                if (logoImg) {
                    slide.addImage({ 
                        data: logoImg, 
                        x: (w/2) - (w*0.2), y: h*0.05, 
                        w: w*0.4, h: h*0.08, 
                        sizing: { type: 'contain' } 
                    });
                }

                // 3. 메인 타이틀 (개별 텍스트 박스)
                slide.addText(formData.title, { 
                    x: w*0.05, y: h*0.35, w: w*0.9, 
                    align: 'center', 
                    fontSize: itemType === 'horizontal' ? 44 : 38, 
                    bold: true, color: '000000', 
                    fontFace: 'Malgun Gothic',
                    isTextBox: true
                });

                // 4. 구분선 (Shape 객체)
                slide.addShape(pptx.ShapeType.rect, { 
                    x: w*0.1, y: h*0.52, w: w*0.8, h: 0.03, 
                    fill: { color: 'E2E8F0' } 
                });

                // 5. 날짜 정보 (개별 텍스트 박스)
                slide.addText(formData.date, { 
                    x: 0, y: h*0.58, w: w, align: 'center', 
                    fontSize: 16, color: '64748B',
                    fontFace: 'Malgun Gothic'
                });

                // 6. 장소 정보 (개별 텍스트 박스 - 강조)
                slide.addText(formData.venue, { 
                    x: 0, y: h*0.65, w: w, align: 'center', 
                    fontSize: 24, bold: true, color: '4F46E5',
                    fontFace: 'Malgun Gothic'
                });

                // 7. 지시 화살표 (방향 지시형일 경우)
                if (subType === 'directional') {
                    const arrowMap = { up: 'upArrow', down: 'downArrow', left: 'leftArrow', right: 'rightArrow' };
                    slide.addShape(pptx.ShapeType[arrowMap[formData.direction]], { 
                        x: (w/2) - (w*0.15), y: h*0.15, w: w*0.3, h: w*0.3, 
                        fill: { color: '4F46E5' } 
                    });
                }

                // 8. 하단 주최자 정보 바 (Background + Text)
                slide.addShape(pptx.ShapeType.rect, { 
                    x: 0, y: h*0.88, w: w, h: h*0.12, 
                    fill: { color: '0F172A' } 
                });
                slide.addText(formData.organizers, { 
                    x: 0, y: h*0.91, w: w, align: 'center', 
                    fontSize: 12, color: '94A3B8', bold: true,
                    fontFace: 'Malgun Gothic',
                    charSpacing: 2
                });

                pptx.writeFile({ fileName: `BannerDraft_${formData.title}.pptx` });
            };

            return (
                <div className="min-h-screen flex flex-col overflow-hidden bg-slate-50">
                    {/* Header */}
                    <header className="bg-slate-900 text-white px-8 py-5 flex justify-between items-center z-40 shadow-2xl">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-500 p-2.5 rounded-2xl shadow-lg shadow-indigo-500/30">
                                <Icon name="Sparkles" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tighter uppercase leading-none">AI Production Canvas</h1>
                                <p className="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-widest font-mono">Workflow: AI Draft ➔ Human Edit ➔ Print</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setShowSettings(!showSettings)} className={`p-3 rounded-2xl border transition-all ${showSettings ? 'bg-indigo-500 border-indigo-500 shadow-lg' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}>
                                <Icon name="Settings" size={20} />
                            </button>
                            <button onClick={exportToPPT} className="bg-white text-slate-900 px-8 py-3 rounded-2xl text-xs font-black flex items-center gap-2 hover:bg-indigo-50 transition-all shadow-xl active:scale-95 group">
                                <Icon name="Download" size={16} className="group-hover:translate-y-0.5 transition-transform" /> 
                                인쇄용 PPT 초안 생성
                            </button>
                        </div>
                    </header>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="absolute top-24 right-8 w-80 bg-white border border-slate-200 rounded-[2.5rem] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.3)] z-50 p-8 animate-in fade-in zoom-in-95">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-sm font-black flex items-center gap-2 text-slate-900"><Icon name="Key" size={16} className="text-indigo-500"/> AI API Key</h3>
                                <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-900"><Icon name="X" size={16}/></button>
                            </div>
                            <input type="password" value={envApiKey} onChange={(e) => setEnvApiKey(e.target.value)} placeholder="Gemini Key..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-mono mb-4 focus:border-indigo-500 outline-none transition-all"/>
                            <button onClick={() => setShowSettings(false)} className="w-full py-3.5 bg-slate-900 text-white rounded-2xl text-xs font-bold hover:bg-indigo-600 shadow-lg">적용</button>
                        </div>
                    )}

                    {/* AI Prompting Area */}
                    <div className="bg-white border-b border-slate-200 px-8 py-10 z-20 shadow-sm">
                        <div className="max-w-5xl mx-auto relative group">
                            <div className="absolute left-6 top-1/2 -translate-y-1/2 text-indigo-600">
                                {isAiLoading ? <Icon name="Loader2" className="animate-spin" size={24}/> : <Icon name="Search" size={24}/>}
                            </div>
                            <input ref={aiInputRef} type="text" onKeyDown={(e) => e.key === 'Enter' && analyzeSituation(e.currentTarget.value)} placeholder="제작 상황을 설명하세요 (예: 600x1800 배너, 제목 데이터 포럼, 그랜드볼룸 A홀, 날짜는 10월 25일)" className="w-full pl-16 pr-40 py-7 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] text-lg font-medium focus:outline-none focus:border-indigo-500/30 transition-all shadow-inner"/>
                            <button onClick={() => analyzeSituation(aiInputRef.current?.value)} className="absolute right-4 top-1/2 -translate-y-1/2 bg-slate-900 text-white px-8 py-4 rounded-full text-sm font-black hover:bg-indigo-600 transition-all shadow-xl">분석 및 레이아웃 구성</button>
                        </div>
                        {aiMessage && (
                            <div className={`mt-5 max-w-5xl mx-auto px-6 py-4 rounded-2xl text-[12px] font-bold flex items-center gap-3 animate-in fade-in slide-in-from-top-2 ${aiMessage.type === 'success' ? 'bg-indigo-50 text-indigo-600 border border-indigo-100' : 'bg-red-50 text-red-600 border border-red-100'}`}>
                                <Icon name={aiMessage.type === 'success' ? "CheckCircle2" : "AlertCircle"} size={16} /> {aiMessage.text}
                            </div>
                        )}
                    </div>

                    <main className="flex-1 flex overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-[420px] bg-white border-r border-slate-200 overflow-y-auto p-8 space-y-10 scrollbar-hide">
                            <section>
                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-6 block">1. 타입 및 비율 선택</label>
                                <div className="grid grid-cols-1 gap-4 mb-6">
                                    {Object.entries(templates).map(([key, value]) => (
                                        <button key={key} onClick={() => {setItemType(key); setSubType('standard');}} className={`p-6 rounded-[2rem] border-2 transition-all flex items-center gap-5 ${itemType === key ? 'border-indigo-600 bg-indigo-50 shadow-md' : 'border-slate-100 bg-slate-50/50 hover:border-slate-200'}`}>
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center ${itemType === key ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}`}><Icon name={key === 'horizontal' ? 'Flag' : 'FileText'} size={28} /></div>
                                            <div className="text-left">
                                                <div className="font-black text-base text-slate-900">{value.name}</div>
                                                <div className="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-tighter">Scale 1:10 • {value.ratio}</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section className="space-y-6">
                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block">2. 레이아웃 객체별 내용 편집</label>
                                <div className="bg-slate-50 p-6 rounded-[3rem] border border-slate-100 space-y-6 shadow-inner">
                                    <div className="space-y-2">
                                        <span className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em]">Main Title Box</span>
                                        <textarea value={formData.title} onChange={(e)=>handleChange('title', e.target.value)} className="w-full p-5 bg-white border border-slate-200 rounded-[2rem] text-sm font-bold shadow-sm focus:ring-4 focus:ring-indigo-500/5 outline-none transition-all" rows={3}/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <span className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em]">Date Text</span>
                                            <input value={formData.date} onChange={(e)=>handleChange('date', e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl text-[11px] font-bold shadow-sm outline-none" />
                                        </div>
                                        <div className="space-y-2">
                                            <span className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em]">Venue Text</span>
                                            <input value={formData.venue} onChange={(e)=>handleChange('venue', e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl text-[11px] font-bold shadow-sm text-indigo-600 outline-none" />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <span className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em]">Organizer Box</span>
                                        <input value={formData.organizers} onChange={(e)=>handleChange('organizers', e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl text-[11px] font-bold shadow-sm outline-none" />
                                    </div>
                                </div>
                            </section>

                            <section>
                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-6">3. 시각 미디어 애셋</label>
                                <div className="grid grid-cols-2 gap-4">
                                    {['logo', 'bg'].map((type) => {
                                        const img = type === 'logo' ? logoImg : bgImg;
                                        return (
                                            <div key={type} className="relative group">
                                                <input type="file" id={`up-${type}`} className="hidden" accept="image/*" onChange={(e)=>handleImageUpload(e, type)} />
                                                <label htmlFor={`up-${type}`} className={`w-full h-32 rounded-[2rem] border-2 border-dashed flex flex-col items-center justify-center cursor-pointer overflow-hidden transition-all ${img ? 'border-indigo-500 bg-white shadow-lg' : 'border-slate-100 bg-slate-50 hover:bg-indigo-50'}`}>
                                                    {img ? <img src={img} className="w-full h-full object-contain p-5" alt={type} /> : <div className="text-center"><Icon name="Upload" size={24} className="mx-auto text-slate-300" /><span className="text-[10px] font-black text-slate-400 uppercase block mt-2">{type === 'logo' ? 'Logo' : 'Background'}</span></div>}
                                                </label>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        </aside>

                        {/* Banner Preview Area */}
                        <div className="flex-1 flex items-center justify-center p-20 overflow-hidden relative guide-grid">
                            <div className="relative flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-1000">
                                
                                <div className="mb-6 flex gap-3">
                                    <span className="bg-slate-900 text-white px-6 py-2.5 rounded-full text-[11px] font-black shadow-2xl uppercase tracking-[0.2em]">{current.name}</span>
                                    <span className="bg-white text-slate-400 px-6 py-2.5 rounded-full text-[11px] font-black shadow-2xl border border-slate-100 uppercase tracking-[0.2em]">{current.ratio}</span>
                                </div>

                                <div className="banner-preview-box bg-white rounded-sm overflow-hidden flex flex-col relative"
                                     style={{
                                         width: `${current.visualW}px`,
                                         height: `${current.visualH}px`,
                                         backgroundImage: bgImg ? `url(${bgImg})` : 'none',
                                         backgroundSize: 'cover',
                                         backgroundPosition: 'center'
                                     }}>
                                    
                                    {/* 개체 매핑 가이드 레이어 */}
                                    {showPptGuide && (
                                        <div className="absolute inset-0 pointer-events-none z-10">
                                            <div className="absolute top-[5%] left-[10%] right-[10%] h-[10%] border border-dashed border-indigo-400/50 rounded flex items-center justify-center text-[8px] text-indigo-400 font-black uppercase">Object 1: Logo Img</div>
                                            <div className="absolute top-[35%] left-[5%] right-[5%] h-[15%] border border-dashed border-indigo-400/50 rounded flex items-center justify-center text-[8px] text-indigo-400 font-black uppercase">Object 2: Title Text</div>
                                            <div className="absolute top-[55%] left-[5%] right-[5%] h-[10%] border border-dashed border-indigo-400/50 rounded flex items-center justify-center text-[8px] text-indigo-400 font-black uppercase">Object 3: Sub Info</div>
                                            <div className="absolute bottom-0 left-0 right-0 h-[12%] border border-dashed border-slate-400/50 rounded flex items-center justify-center text-[8px] text-slate-400 font-black uppercase bg-white/20">Object 4: Bottom Footer</div>
                                        </div>
                                    )}

                                    {/* 실제 프리뷰 렌더링 */}
                                    <div className="pt-[8%] flex justify-center z-20">
                                        {logoImg ? <img src={logoImg} className="h-12 object-contain px-6" /> : <div className="text-[10px] font-black text-slate-200 border border-dashed border-slate-100 p-2 px-12 rounded-full uppercase tracking-widest">Logo Area</div>}
                                    </div>

                                    <div className="flex-1 flex flex-col items-center px-8 justify-center text-center z-20">
                                        {subType === 'directional' && (
                                            <div className="mb-10 p-5 bg-indigo-600 text-white rounded-full shadow-2xl">
                                                <Icon name={formData.direction === 'up' ? 'ArrowUp' : formData.direction === 'down' ? 'ArrowDown' : formData.direction === 'left' ? 'ArrowLeft' : 'ArrowRight'} size={40} />
                                            </div>
                                        )}
                                        
                                        <div className="bg-white/30 backdrop-blur-xl p-10 rounded-[3rem] border border-white/50 shadow-2xl max-w-[95%]">
                                            <h3 className="text-2xl font-black text-slate-900 leading-[1.1] mb-8 break-keep whitespace-pre-wrap">{formData.title}</h3>
                                            <div className="h-0.5 w-16 bg-slate-900/10 mx-auto mb-8"></div>
                                            <div className="space-y-2">
                                                <div className="text-[11px] text-slate-500 font-black font-mono bg-slate-900/5 px-5 py-2 rounded-full inline-block tracking-tighter">{formData.date}</div>
                                                <div className="text-[13px] font-black text-indigo-600 uppercase block tracking-tight mt-2">{formData.venue}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="h-[12%] bg-slate-900 flex items-center justify-center px-8 border-t border-white/5">
                                        <div className="text-[10px] font-black text-white/40 tracking-[0.5em] uppercase text-center">{formData.organizers}</div>
                                    </div>
                                </div>
                                
                                <div className="w-[85%] h-6 bg-black/10 blur-2xl rounded-full mt-6"></div>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-white border-t border-slate-200 px-8 py-4 flex justify-between items-center z-40 shadow-inner">
                        <div className="flex gap-12 text-[10px] font-black text-slate-400 uppercase tracking-widest font-bold">
                            <span className="flex items-center gap-2 text-green-500"><Icon name="CheckCircle2" size={14} /> AI Engine Active</span>
                            <span className="flex items-center gap-2 text-indigo-500"><Icon name="ImageIcon" size={14} /> Professional Print Scale (1:10)</span>
                            <span className="flex items-center gap-2 text-amber-500"><Icon name="MousePointer2" size={14} /> Individually Editable Objects</span>
                        </div>
                        <div className="text-[10px] font-black text-slate-300 italic tracking-widest uppercase font-mono">© 2026 AI PRODUCTION CANVAS • HIGH-FIDELITY DRAFT SYSTEM</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
